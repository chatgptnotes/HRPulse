[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build --workspace=@hrpulse/frontend && npm run build --workspace=backend && npx prisma generate --schema=backend/prisma/schema.prisma"

[deploy]
startCommand = "npx prisma migrate deploy --schema=backend/prisma/schema.prisma && NODE_ENV=production node backend/dist/backend/src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 300
